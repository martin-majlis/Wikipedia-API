# Install old pythons
# https://launchpad.net/~deadsnakes/+archive/ubuntu/ppa
[tox]
envlist = py310, py311, py312, py313, py314, pypy310

[testenv]
deps =
    typing
    respx
    httpxyz
    pytest
    pytest-asyncio
    pytest-recording
    vcrpy
commands_pre =
    python3 -m pip install -e .
commands =
    python3 -m pytest tests/
